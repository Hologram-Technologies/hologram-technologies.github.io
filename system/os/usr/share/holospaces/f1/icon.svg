  <line x1="18" y1="46" x2="46" y2="18" stroke="url(#g)" stroke-width="2"/>
  <!-- F1 -->
  <text x="32" y="40" text-anchor="middle" font-family="ui-monospace, monospace" font-size="20" font-weight="700" fill="#f0e6c8">F<tspan font-size="13" dy="4">1</tspan></text>
