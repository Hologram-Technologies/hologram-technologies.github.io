<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Holo F1">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c5a046"/>
      <stop offset="1" stop-color="#8a6f2a"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="12" fill="#14110a"/>
  <rect x="4.5" y="4.5" width="55" height="55" rx="11.5" fill="none" stroke="url(#g)" stroke-width="1.5"/>
