<!-- The NCSA spinning globe (re-authored SVG; fidelity reference: Mosaic's animated globe pixmaps).
     The engine spins this via CSS (steps) while WebContents.loading is true; idle = static globe. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 34">
  <defs><clipPath id="g"><circle cx="17" cy="17" r="15"/></clipPath></defs>
  <circle cx="17" cy="17" r="15" fill="#0a3a6b" stroke="#062a4f" stroke-width="2"/>
  <g clip-path="url(#g)" fill="none" stroke="#7fd0ff" stroke-width="1">
    <ellipse cx="17" cy="17" rx="6" ry="15"/>
    <ellipse cx="17" cy="17" rx="12" ry="15"/>
    <line x1="2" y1="17" x2="32" y2="17"/>
    <line x1="2" y1="9" x2="32" y2="9"/>
    <line x1="2" y1="25" x2="32" y2="25"/>
  </g>
  <g clip-path="url(#g)" fill="#1f7a3a" stroke="#0c4a20" stroke-width="0.6">
    <path d="M8 8 q4 2 3 6 q-3 3 -6 1 q-2 -4 3 -7Z"/>
    <path d="M20 18 q5 1 6 6 q-2 4 -7 2 q-3 -4 1 -8Z"/>
  </g>
  <circle cx="12" cy="12" r="4" fill="#ffffff" opacity="0.18"/>
</svg>
