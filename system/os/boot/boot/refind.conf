# refind.conf — Holo Boot
#
# This is a REAL rEFInd configuration file (https://www.rodsbooks.com/refind/),
# parsed by the hologram-native boot manager (boot.html) with the same grammar and
# directive set as the original. rEFInd boots OS loaders it finds on the EFI System
# Partition; Holo Boot boots HOLOSPACES it finds in the κ-store. The mapping is exact:
#
#   ESP volume / loader path  →  the content-addressed κ-store / a holospace loader
#   Secure Boot / shim verify →  Law L5: re-derive the loader's κ before it boots
#   refind.conf + auto-scan   →  this file (manual menuentry) + a HEAD-probe scan
#
# Edit this file in Holo Boot (the ⚙ config drawer) and the menu re-parses live.

# ── Timeout ────────────────────────────────────────────────────────────────────
# Seconds before the default_selection boots automatically. 0 disables the
# countdown (wait forever); -1 boots the default immediately unless a key is held.
timeout 20

# Power off after the timeout instead of booting the default. (false = boot.)
shutdown_after_timeout false

# Persist "last booted" + the boot order in NVRAM (here: the per-origin κ-store /
# OPFS). When true, default_selection "+" resolves to the previously booted entry.
use_nvram true

# Blank the screen (screensaver) after N seconds of inactivity; -1 blanks until a
# key/pointer wakes it. 0 disables.
screensaver 0

# How verbose the boot log is (0 silent … 4 chatty). Holo Boot logs to its console.
log_level 1

# ── Look & feel ──────────────────────────────────────────────────────────────────
# The icon set + the active theme. A theme is an included config (see `include`)
# carrying its own banner / selection / icons — exactly as rEFInd themes do.
icons_dir boot/icons

# The banner image shown above the menu (ICNS/BMP/PNG/JPEG). Holo Boot ships an SVG.
banner boot/icons/banner.svg
banner_scale noscale

# OS icons are big_icon_size px; tool icons are small_icon_size px.
big_icon_size 128
small_icon_size 48

# The highlight drawn behind the selected OS icon / tool icon.
selection_big   boot/icons/selection_big.svg
selection_small boot/icons/selection_small.svg

# Use a custom bitmap font for text (PNG glyph sheet). Unset → the platform font.
#font boot/icons/font.png

# Force text-only mode (no graphics). Holo Boot honours it (a text list menu).
textonly false

# Preferred resolution: "WIDTH HEIGHT", a UEFI mode number, or "max". In-browser
# the stage is the viewport; "max" simply fills it.
resolution max

# Pointer input. rEFInd added mouse + touch; Holo Boot enables both by default.
enable_mouse true
enable_touch true
mouse_size 16
mouse_speed 4

# Give these OS classes the Mac-style full-graphics handoff (vs. a text boot).
use_graphics_for osx, linux, windows, grub

# Hide individual UI elements. Tokens: banner, label, singleuser, safemode,
# hwtest, arrows, hints, editor, badges, all. (Empty = show everything.)
hideui hints

# ── Scanning ─────────────────────────────────────────────────────────────────────
# Which boot sources to scan. "manual" honours the menuentry stanzas below. The single
# canonical shell is the one manual entry; auto-scan ("internal") is OFF so the retired
# per-app full-page loaders are never re-discovered as rival boot targets — every app opens
# as a window INSIDE the one desktop instead. "netboot" (peer-announced loaders) stays opt-in.
scanfor manual

# Extra directories to scan for loaders, beyond the defaults.
also_scan_dirs boot, .

# Never scan these volumes / dirs / files / firmware entries / tools.
dont_scan_volumes .cef, target
dont_scan_dirs node_modules, .git
dont_scan_files coi-serviceworker.min.js, boot-probe.html
dont_scan_firmware shell
dont_scan_tools

# Treat bare kernels as bootable + fold a loader's versions under one icon.
scan_all_linux_kernels true
fold_linux_kernels true
linux_prefixes vmlinuz, bzImage, kernel

# Cap how many loaders show at once (0 = unlimited).
max_tags 0

# ── Tools (the second / bottom row) ──────────────────────────────────────────────
# rEFInd tokens, in display order. Holo Boot maps each to its hologram-native
# equivalent: shell → the Hologram EFI shell; firmware → the Platform Manager
# (the "firmware setup"); memtest → a κ-store integrity self-test; netboot →
# peer-announced loaders; about/hidden_tags/bootorder/exit/shutdown/reboot as named.
showtools shell, memtest, netboot, bootorder, hidden_tags, about, firmware, exit, shutdown, reboot

# ── The default selection ────────────────────────────────────────────────────────
# A substring of an entry's title, a 1-9 position, or "+" for the last booted entry.
# An optional "HH:MM HH:MM" time range scopes it to part of the day.
default_selection +

# ════════════════════════════════════════════════════════════════════════════════
# Manual boot stanzas — one holospace per menuentry, exactly as rEFInd manual stanzas.
# `loader` is the holospace page; `volume` names the κ-store; `options` are the launch
# query handed to the loader; `ostype` selects which submenu options apply; `graphics`
# on = the full-screen graphical boot. The κ is re-derived from the loader bytes at
# boot (Law L5) — Holo Boot's Secure Boot.
# ════════════════════════════════════════════════════════════════════════════════

# The ONE Hologram OS desktop — the single canonical holospace shell: the SDK/World windowed
# desktop (apps/sdk). Every application (browser · music · docs · wallet · workspace · …) opens as
# a WINDOW inside it, so there is no longer a separate full-page boot target per app. The greeter
# (SDDM) is interposed before it, giving the faithful flow rEFInd → Plymouth → SDDM → shell.
menuentry "Hologram OS" {
    icon         boot/icons/os_hologram.svg
    volume       kappa-store
    loader       apps/sdk/index.html
    ostype       Linux
    graphics     on
    splashtheme  holo-pulse
    options      ""
    submenuentry "Open the Platform Manager (firmware setup)" {
        loader      home.html
        add_options "?manage"
    }
    submenuentry "Open the Workspace (VS Code)" {
        loader      workspace.html
    }
    submenuentry "Boot Debian (terminal)" {
        loader      os.html
    }
}

# A disabled example — present, but not shown until you remove `disabled`
# (or un-hide it from the Hidden Tags tool). This is how rEFInd parks an entry.
menuentry "Boot from a teleport link (holo://κ)" {
    icon     boot/icons/os_unknown.svg
    volume   kappa-store
    loader   holospace.html
    ostype   Linux
    graphics on
    options  "?src="
    disabled
}

# Load a second config (a theme overrides banner / selection / icons here).
include boot/themes/default/theme.conf
