# theme.conf — Holo Boot "midnight" theme (rEFInd theme format)
#
# An alternate theme: deeper indigo background, violet accent, a full-screen banner.
# Select it in Holo Boot's theme picker, or `include boot/themes/midnight/theme.conf`.

icons_dir       boot/icons
banner          boot/icons/banner.svg
banner_scale    fillscreen
selection_big   boot/icons/selection_big.svg
selection_small boot/icons/selection_small.svg
big_icon_size   144
small_icon_size 56
hideui          hints, badges
holo_bg     #0b0420
holo_fg     #ece6ff
holo_accent #a371f7
holo_dim    #7a6ea8
