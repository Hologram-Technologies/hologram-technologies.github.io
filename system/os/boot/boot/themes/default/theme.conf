# theme.conf — Holo Boot "default" theme (rEFInd theme format)
#
# A rEFInd theme is just a config fragment `include`d from refind.conf, with paths
# relative to the theme directory. It overrides the banner, the selection graphics,
# the icon directory, and sizing. This is the canonical dark Hologram look.

icons_dir       boot/icons
banner          boot/themes/default/banner.svg
banner_scale    noscale
selection_big   boot/themes/default/selection_big.svg
selection_small boot/themes/default/selection_small.svg
big_icon_size   128
small_icon_size 48
hideui          hints
# Theme palette (Holo Boot extension; ignored by stock rEFInd):
#   bg, fg, accent, dim — the boot screen colours.
holo_bg     #05070a
holo_fg     #e6edf3
holo_accent #58a6ff
holo_dim    #6a727c
