<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- Holo Canvas dpr-shim — the same script the dev SW injects, baked inline for the native (no-SW) host.
     Reads ?__hsr=<scale>: renders at internal-res (devicePixelRatio→base×scale), forces preserveDrawingBuffer
     so the parent can capture, and counts draws into __holoSeq for the frame-coherence skip. -->
<script>(function(){try{var s=parseFloat(new URLSearchParams(location.search).get('__hsr'));if(!(s>0))return;var b=window.devicePixelRatio||1,t=b*Math.max(0.3,Math.min(1,s));Object.defineProperty(window,'devicePixelRatio',{configurable:true,get:function(){return t;}});window.__holoMemoReady=new Promise(function(r){window.__holoMemoResolve=r;});var gc=HTMLCanvasElement.prototype.getContext;HTMLCanvasElement.prototype.getContext=function(ty,at){if(/webgl/i.test(ty)){at=Object.assign({},at,{preserveDrawingBuffer:true});}var c=gc.call(this,ty,at);try{if(c&&/webgl/i.test(ty)){['drawArrays','drawElements','drawArraysInstanced','drawElementsInstanced'].forEach(function(m){var o=c[m];if(o){c[m]=function(){window.__holoSeq=(window.__holoSeq||0)+1;return o.apply(c,arguments);};}});}}catch(e){}return c;};window.__HOLO_SR__={base:b,scale:t};}catch(e){}})();</script>
<title>Raymarch — WebGL2</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05070d;font:13px ui-monospace,Menlo,monospace;color:#bfe6ff}
  #c{position:fixed;inset:0;width:100vw;height:100vh;display:block;touch-action:none;cursor:grab}
  #t{position:fixed;right:14px;top:12px;text-align:right;opacity:.85;pointer-events:none;text-shadow:0 1px 3px #000}
  #t b{color:#8fe3ff;font-size:15px}
  #t small{opacity:.6}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="t"><b>Raymarch · WebGL2</b><br/>orbiting spheres · soft shadows<br/><small>drag to orbit</small></div>
<script>
const cv = document.getElementById("c");
const gl = cv.getContext("webgl2", { antialias: false });
if (!gl) document.body.innerHTML = "<p style='padding:20px'>WebGL2 unavailable</p>";

const VS = `#version 300 es
void main(){ vec2 p=vec2((gl_VertexID<<1)&2, gl_VertexID&2); gl_Position=vec4(p*2.0-1.0,0.,1.); }`;

const FS = `#version 300 es
precision highp float;
out vec4 o;
uniform vec2 R; uniform float T; uniform vec2 M;
// SDFs
float sdSphere(vec3 p, float r){ return length(p)-r; }
float sdPlane(vec3 p){ return p.y+1.0; }
mat2 rot(float a){ float c=cos(a),s=sin(a); return mat2(c,-s,s,c); }
vec2 map(vec3 p){
  float d = sdPlane(p); float id = 0.0;
  for(int i=0;i<3;i++){
    float f=float(i);
    vec3 c = vec3(sin(T*0.7+f*2.1)*1.6, sin(T*1.1+f*1.7)*0.4+0.1, cos(T*0.6+f*2.3)*1.6);
    float d2 = sdSphere(p-c, 0.6+0.1*sin(T+f));
    if(d2<d){ d=d2; id=1.0+f; }
  }
  return vec2(d,id);
}
vec3 calcNormal(vec3 p){
  vec2 e=vec2(0.001,0.0);
  return normalize(vec3(map(p+e.xyy).x-map(p-e.xyy).x, map(p+e.yxy).x-map(p-e.yxy).x, map(p+e.yyx).x-map(p-e.yyx).x));
}
float shadow(vec3 ro, vec3 rd){
  float res=1.0,t=0.05;
  for(int i=0;i<32;i++){ float h=map(ro+rd*t).x; if(h<0.001) return 0.0; res=min(res,10.0*h/t); t+=clamp(h,0.02,0.3); if(t>12.0) break; }
  return clamp(res,0.0,1.0);
}
vec3 palette(float id){
  if(id<0.5) return vec3(0.2);                 // plane base
  if(id<1.5) return vec3(1.0,0.35,0.2);
  if(id<2.5) return vec3(0.25,0.9,0.55);
  return vec3(0.35,0.55,1.0);
}
void main(){
  vec2 uv = (gl_FragCoord.xy*2.0 - R)/R.y;
  // camera orbits with the mouse (drag) on a horizontal circle, ALWAYS above the plane (y=-1)
  float ay = (M.x*2.0-1.0)*3.1415 + T*0.05;
  vec3 ro = vec3(sin(ay), 0.0, cos(ay)) * 6.0;
  ro.y = 1.4 + 3.2*clamp(M.y,0.0,1.0);        // height 1.4..4.6, never dips below the ground
  vec3 ta = vec3(0.0,0.2,0.0);
  vec3 ww=normalize(ta-ro), uu=normalize(cross(ww,vec3(0,1,0))), vv=cross(uu,ww);
  vec3 rd = normalize(uv.x*uu + uv.y*vv + 1.6*ww);
  // march
  float t=0.0; vec2 h; vec3 p;
  for(int i=0;i<96;i++){ p=ro+rd*t; h=map(p); if(h.x<0.001||t>30.0) break; t+=h.x; }
  vec3 col;
  vec3 lig = normalize(vec3(0.7,0.9,0.4));
  if(t<30.0){
    vec3 n = calcNormal(p);
    float dif = clamp(dot(n,lig),0.0,1.0);
    float sh = shadow(p+n*0.01, lig);
    float amb = 0.4+0.6*n.y;
    vec3 base = palette(h.y);
    if(h.y<0.5){ float chk = mod(floor(p.x)+floor(p.z),2.0); base = mix(vec3(0.12),vec3(0.32),chk); }
    col = base*(amb*0.35 + dif*sh*1.1);
    // simple reflection of the sky
    vec3 r = reflect(rd,n);
    col += 0.15*pow(clamp(dot(r,lig),0.0,1.0),16.0);
    col = mix(col, vec3(0.04,0.07,0.12), 1.0-exp(-0.0008*t*t*t)); // fog
  } else {
    col = mix(vec3(0.03,0.06,0.12), vec3(0.16,0.22,0.36), clamp(rd.y*1.2+0.3,0.0,1.0)); // sky
    col += 0.3*pow(clamp(dot(rd,lig),0.0,1.0),64.0);
  }
  col = pow(col, vec3(0.4545)); // gamma
  o = vec4(col,1.0);
}`;

function sh(type, src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s)); return s; }
const prog = gl.createProgram();
gl.attachShader(prog, sh(gl.VERTEX_SHADER, VS)); gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog); if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const uR=gl.getUniformLocation(prog,"R"), uT=gl.getUniformLocation(prog,"T"), uM=gl.getUniformLocation(prog,"M");
const vao=gl.createVertexArray(); gl.bindVertexArray(vao);

let mouse=[0.5,0.35], dragging=false, last=[0,0];
cv.addEventListener("pointerdown", e=>{ dragging=true; last=[e.clientX,e.clientY]; cv.style.cursor="grabbing"; });
addEventListener("pointerup", ()=>{ dragging=false; cv.style.cursor="grab"; });
addEventListener("pointermove", e=>{ if(!dragging)return; mouse[0]=Math.min(1,Math.max(0,mouse[0]+(e.clientX-last[0])/window.innerWidth)); mouse[1]=Math.min(1,Math.max(0,mouse[1]-(e.clientY-last[1])/window.innerHeight)); last=[e.clientX,e.clientY]; });

function resize(){ const dpr=window.devicePixelRatio||1; cv.width=Math.round(window.innerWidth*dpr); cv.height=Math.round(window.innerHeight*dpr); gl.viewport(0,0,cv.width,cv.height); }
addEventListener("resize", resize); resize();

const t0 = performance.now();
function frame(){
  gl.uniform2f(uR, cv.width, cv.height);
  gl.uniform1f(uT, (performance.now()-t0)/1000);
  gl.uniform2f(uM, mouse[0], mouse[1]);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
window.RAYMARCH = { gl, draw: ()=>gl.drawArrays(gl.TRIANGLES,0,3) };
</script>
</body>
</html>
