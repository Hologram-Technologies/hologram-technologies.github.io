# sddm.conf — the display-manager configuration (real SDDM format). In Hologram OS the
# "display server" is the browser tab and the "seat" is this device; the greeter is
# /usr/share/frame/login.html. Authentication is a self-sovereign key unlock (holospaces
# docs/08 §Identity), so there is no [Users] PAM section — operators are content-addressed
# keys held in the per-device store (IndexedDB/OPFS), not /etc/passwd rows.

[Theme]
Current=holo
ThemeDir=/usr/share/sddm/themes
CursorTheme=holo

[General]
# Halt/Reboot map to the greeter's power buttons: reboot → the bootloader (rEFInd).
HaltCommand=/usr/bin/holo-poweroff
RebootCommand=/boot.html
Numlock=none

[Autologin]
# Off by design — the sovereign key must be unlocked. Set a κ here to auto-resume a session.
User=
Session=primeos
Relogin=false

[Wayland]
SessionDir=/usr/share/wayland-sessions
