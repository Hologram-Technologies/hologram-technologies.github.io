name: security

# Secrets are never committed (a leaked operator key is a stolen identity). The
# scan runs on every push and PR. The action is replaced by the verified gitleaks
# binary (the GitHub Action requires a paid licence for organisations); the binary
# is pinned by the publisher's own checksums, so the supply-chain authority stays
# pinned, not floating on a tag.

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install gitleaks (verified against the publisher's checksums)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ver=$(curl -sSfL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -oE '"tag_name": *"v[^"]+"' | head -1 | grep -oE '[0-9.]+')
          base="https://github.com/gitleaks/gitleaks/releases/download/v${ver}"
          curl -sSfL "$base/gitleaks_${ver}_linux_x64.tar.gz" -o "gitleaks_${ver}_linux_x64.tar.gz"
          curl -sSfL "$base/gitleaks_${ver}_checksums.txt" -o gitleaks_checksums.txt
          grep "gitleaks_${ver}_linux_x64.tar.gz" gitleaks_checksums.txt | sha256sum -c -
          tar xzf "gitleaks_${ver}_linux_x64.tar.gz" gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan full history
        run: gitleaks detect --no-banner --redact --config .gitleaks.toml --log-opts="--all"
