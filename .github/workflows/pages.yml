name: Deploy Hologram OS to GitHub Pages

# Publishes the OS as-is: the site root IS the FHS image (os/). No build step — the in-browser
# Service Worker (os/holo-fhs-sw.js, the twin of tools/holo-serve-fhs.mjs, sharing
# os/lib/holo-fhs-map.mjs) maps the flat URL space onto the FHS tree and supplies cross-origin
# isolation at runtime. Two fail-closed gates guard every deploy: the staged-ARTIFACT seal check
# (reseal.mjs --check on _site/os — verifies the exact bytes uploaded) and a post-deploy COLD-BOOT
# witness (tools/holo-cold-boot-witness.mjs — a fresh visitor must boot with no Safety-Stop). See the
# "Verify staged artifact" step and the verify-boot job below.
#
# Serve at a ROOT site (a <user>.github.io user/org site, or a custom domain) so the app's
# absolute references (/_shared/…, /usr/…) resolve. Under a project subpath (/<repo>/) those
# absolute paths escape the SW scope — that conversion is the one remaining follow-up.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write   # commit the regenerated CHANGELOG.md / feed.xml back to the repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}   # handed to the verify-boot job below
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags, so git-cliff can build the whole changelog
      # ── Apps come from the SEPARATE apps repo. Vendor them into the OS deploy so every /apps/<id>/*
      # request resolves SAME-ORIGIN (fast, no cross-origin heal round-trip). The Service Worker still
      # re-derives every byte against the app's holospace.lock.json (Law L5) — vendoring changes only
      # WHERE the bytes are fetched, never WHETHER they are content-verified. Without this, the OS site
      # lists apps in the catalog but their bytes live on another origin and every launch 404s → heal.
      - name: Check out the apps repo
        uses: actions/checkout@v4
        with:
          repository: Hologram-Technologies/hologram-apps
          ref: main
          path: apps-src
          # No LFS / huge blobs: the forge model caches (apps/q/forge/.models, .kvxproc) are .gitignored
          # in the apps repo and excluded from every lock, so they never reach the deploy.
      # ── Live, self-updating changelog ────────────────────────────────────────────────────────
      # Regenerate CHANGELOG.md from the repo history (Conventional Commits → Keep a Changelog),
      # build the Atom feed, prove conformance (fail-closed), and commit the refreshed source of
      # truth back. Folding this into the deploy keeps the live page current with no manual step,
      # and sidesteps the GITHUB_TOKEN "no re-trigger" rule a separate commit-then-deploy would hit.
      - name: Regenerate changelog (git-cliff)
        continue-on-error: true   # if git-cliff hiccups, fall back to the committed CHANGELOG.md — never break the site deploy
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
      - name: Build Atom feed and witness conformance
        run: |
          node system/tools/changelog-feed.mjs CHANGELOG.md feed.xml
          node system/tools/changelog-witness.mjs CHANGELOG.md   # fail-closed: bad changelog blocks the deploy
      - name: Commit refreshed changelog
        continue-on-error: true
        run: |
          if ! git diff --quiet -- CHANGELOG.md feed.xml; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add CHANGELOG.md feed.xml
            git commit -m "chore(changelog): regenerate from history [skip ci]"
            git push
          fi
      # ── Documentation: build from source, so the published docs always match the code ──────────
      # The docs are authored in system/docs/site (Astro Starlight). The build first regenerates the
      # machine-readable reference FROM source — conformance.jsonld → the gate's rows, docs/adr/*.md →
      # the ADR index, plus llms.txt — then emits static HTML into the repo-root docs/ that the stage
      # step below publishes. Rebuilding here means a push that changes the OS auto-updates the docs
      # with no manual step. A drift gate runs first and fails closed if a doc names something the
      # code no longer has.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: system/docs/site/package-lock.json
      # ── Seal gate (Law L5, fail-closed) ───────────────────────────────────────────────────────
      # The OS is published AS-IS: the in-browser Service Worker re-derives every served byte to its
      # pinned κ and refuses a mismatch (409). So a commit whose seals drifted — an edit (or the
      # shell auto-formatter) not followed by `npm run reseal` — would deploy an image that 409s at
      # boot. Verify the committed image is fully sealed (boot closure + whole tree + SW anchor) and
      # FAIL the deploy if not, before any later step mutates the tree. Fix locally: `npm run reseal`.
      - name: Seal gate (served bytes must == pinned κ)
        run: node system/tools/reseal.mjs --check
      - name: Docs reference drift gate (fail-closed)
        run: node system/tools/docs-reference-witness.mjs   # a stale documented name/path blocks the deploy
      - name: Build docs site (Astro Starlight)
        # Docs base is deployment-relative. A ROOT site (a <user>.github.io user/org repo, or a custom
        # domain) serves at "/", so docs live at /docs. A project-page repo serves under /<repo>/, so the
        # base must be /<repo>/docs or Astro's absolute asset refs (/docs/_astro/…) escape the subpath and
        # render unstyled. Detect the org/user root site by the repo name ending in `.github.io`.
        env:
          DOCS_BASE: ${{ endsWith(github.event.repository.name, '.github.io') && '/docs' || format('/{0}/docs', github.event.repository.name) }}
        run: |
          cd system/docs/site
          npm ci
          npm run build   # prebuild regenerates the reference; Astro emits into ../../../docs
      # Vendor the SMALL content-addressed runtime artifacts that are gitignored (NOT source) so they
      # ship in the deploy and their features work: esbuild-wasm (Forge code editor, 12 MB), Chrome
      # DevTools front_end (84 MB), interact.js (widget snapping, 96 KB). Each script fetches + verifies
      # integrity. Best-effort (|| true): a flaky upstream degrades that one feature, never the deploy.
      # The HEAVY weights (voice 3.4 GB, Q models) are NOT vendored here — they heal by κ at runtime
      # (holo-fhs-sw: Release asset → IPFS), so the Pages site stays under the 1 GB cap.
      - name: Vendor small runtime artifacts
        run: |
          cd system
          node tools/vendor-esbuild-wasm.mjs || true
          node tools/vendor-interactjs.mjs || true
          node tools/vendor-chrome-devtools.mjs || true
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # self-enable Pages (GitHub Actions source) on a fresh repo, so the first push deploys with no manual settings toggle
      # Stage a lean site from the new layout (everything lives under system/, except the gateway
      # + agent/governance docs which sit at the repo root). Published: the gateway, the agent map,
      # the AGENTS + CONSTITUTION docs, the FHS image as the os/ subtree, and a root mirror of
      # /.well-known. No source dirs (crates/docs/tools) are published. No build — the Service
      # Worker maps flat→FHS + supplies cross-origin isolation at runtime.
      # Assemble _site via the ONE shared assembler (tools/holo-stage-site.mjs) — the SAME script the local
      # cold-machine harness runs, so "what the deploy ships" is reproducible off-CI. It copies the gateway +
      # root docs, the built docs site (+ manifesto/download/changelog/feed), the OS subtree, the gateway's
      # raw runtime assets, the build marker, and vendors apps at their flat serve path as (catalog landingPage
      # ids) ∪ (os/etc/core-surfaces.json) — so a shell surface dropped from the launcher (the empty-Play bug)
      # can't silently vanish. apps-src = the separately-checked-out apps repo. Output identical to the prior
      # inline bash; the logic now lives in one tested place instead of a workflow heredoc.
      - name: Stage site (gateway + OS subtree + apps)
        run: node system/tools/holo-stage-site.mjs --repo . --apps apps-src --out _site
      # ── Staged-ARTIFACT seal gate (Law L5, fail-closed) — verify the bytes we ACTUALLY upload ──────
      # The source seal gate above ran BEFORE staging + app/runtime vendoring. This re-derives every
      # pinned κ against the assembled _site/os — the exact tree that goes live — so a staging or vendor
      # step that corrupted a pinned byte can never reach a visitor (it would 409 at boot). Same single
      # verifier as the source gate (no second, drifting checker), pointed at the artifact via HOLO_OS_DIR.
      - name: Verify staged artifact (deploy only what re-derives)
        run: HOLO_OS_DIR=_site/os node system/tools/reseal.mjs --check
      # ── Cold-APP coverage gate (Law L5, fail-closed) — every advertised/loaded surface must resolve ──
      # The seal gate above proves pinned bytes re-derive; it does NOT prove the launcher's apps (or shell
      # surfaces like the Play honeycomb) were actually vendored into the artifact. This asserts every id in
      # (catalog landingPage ids) ∪ (os/etc/core-surfaces.json) has its holospace.json + lock + index.html in
      # _site/os — so an advertised-but-unvendored surface (the empty-Play / "many parts dont work" bug) FAILS
      # the deploy instead of reaching a visitor. Reads the SAME union the vendor step copies, so they can't drift.
      - name: Verify app coverage (every advertised/loaded surface is vendored)
        run: HOLO_OS_DIR=_site/os node system/tools/holo-cold-app-witness.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4

  # ── Post-deploy COLD-BOOT witness (fail-closed) ──────────────────────────────────────────────────
  # The absence of THIS is what let a mis-sealed image reach users on 2026-06-21: the SW refused every
  # request (anchor != served closure) and detection waited on a human. This job loads the LIVE site as
  # a genuinely cold visitor and asserts it boots with no Safety-Stop — turning a silent universal
  # outage into a red deploy. It waits for this commit's build marker before asserting (no stale-byte
  # race). Phase A (network-only) re-derives the exact invariant that broke; Phase B drives a real
  # browser under the worker. A red here means the just-published site is down — investigate immediately.
  verify-boot:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install witness deps (Playwright + Chromium/WebKit/Firefox)
        run: |
          cd system
          npm ci || npm install
          npx playwright install --with-deps chromium webkit firefox
      # Cross-engine COLD-MACHINE matrix on the LIVE bytes (P4): the OS must boot with no Safety-Stop AND every
      # advertised/loaded surface must resolve (no 404/409) AND a missing navigation must render the calm in-OS
      # not-found AND a missing capability must degrade to a labeled fallback — on Chromium, WebKit AND Firefox.
      # The pre-upload gate proves the artifact; this proves the published reality (CDN propagation, host quirks)
      # across the three engines a real visitor might use. EXPECT_BUILD makes each engine wait for THIS commit's
      # build marker first (no stale-byte race). A red here means the just-published site is broken for some
      # real browser — investigate immediately.
      - name: Cold-machine matrix (boots + every surface resolves, all engines)
        env:
          EXPECT_BUILD: ${{ github.sha }}
        run: node system/tools/holo-cold-machine.mjs --live "${{ needs.deploy.outputs.page_url }}" --with-browser --engines chromium,webkit,firefox
