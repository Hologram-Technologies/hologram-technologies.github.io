<svg viewBox="0 0 1080 667" width="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HOLOGRAM OS — own your data, compute and intelligence">
<title>Hologram OS</title>
<desc>The Hologram OS mark and wordmark on black, with a braille code scramble that rotates the words DATA, COMPUTE and INTELLIGENCE after the static line OWN YOUR.</desc>
<style>
  .wm{ font-family:'Helvetica Neue',Helvetica,Arial,system-ui,'Segoe UI',sans-serif; font-weight:300; font-size:132px; letter-spacing:.05em; fill:#fff; }
  .tg{ font-family:'Helvetica Neue',Helvetica,Arial,system-ui,'Segoe UI',sans-serif; font-weight:300; font-size:50px; letter-spacing:.16em; fill:#fff; }
  .tg .sep{ fill:#6b6b6b; }
  .rw{ font-family:'Helvetica Neue',Helvetica,Arial,system-ui,'Segoe UI',sans-serif; font-weight:300; font-size:50px; letter-spacing:.14em; fill:#fff; opacity:0;
       animation:rot 12s linear infinite; }
  .rw.br{ font-family:'DejaVu Sans Mono','Segoe UI Symbol','Apple Symbols',ui-monospace,'Cascadia Mono',monospace; letter-spacing:.10em; }
  @keyframes rot{ 0%{opacity:1} 1.240%{opacity:1} 1.250%{opacity:0} 100%{opacity:0} }
  @media (prefers-reduced-motion: reduce){ .rw{ animation:none } .rw:first-of-type{ opacity:1 } }
</style>

