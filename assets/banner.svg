<svg viewBox="0 0 1040 540" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HOLOGRAM OS">
<defs>
  <linearGradient id="holo" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#d6fff1"/><stop offset="22%" stop-color="#7defc9"/>
    <stop offset="58%" stop-color="#5b8cff"/><stop offset="100%" stop-color="#c77bff"/>
  </linearGradient>
  <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7defc9"/><stop offset="50%" stop-color="#5b8cff"/><stop offset="100%" stop-color="#c77bff"/>
  </linearGradient>
  <radialGradient id="sky" cx="50%" cy="14%" r="95%">
    <stop offset="0%" stop-color="#10131c"/><stop offset="48%" stop-color="#080a10"/><stop offset="100%" stop-color="#030305"/>
  </radialGradient>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
  <style>
    .bw{ font-family:ui-monospace,"DejaVu Sans Mono",SFMono-Regular,Menlo,Consolas,monospace;
         font-size:30px; letter-spacing:1px; fill:url(#wave); opacity:0;
         animation:flip 2.4s steps(1) infinite; }
    @keyframes flip{ 0%{opacity:1} 4.16%{opacity:1} 4.17%{opacity:0} 100%{opacity:0} }
    .aur{ animation:breathe 6s ease-in-out infinite; transform-origin:center; }
    @keyframes breathe{ 0%,100%{opacity:.42} 50%{opacity:.62} }
    .mark{ animation:lift 5s ease-in-out infinite; transform-origin:center; }
    @keyframes lift{ 0%,100%{opacity:.94} 50%{opacity:1} }
    @media (prefers-reduced-motion: reduce){
      .bw{ animation:none } .bw:first-of-type{ opacity:1 }
      .aur,.mark{ animation:none }
    }
  </style>
</defs>

<rect width="1040" height="540" rx="22" fill="url(#sky)"/>

<g class="aur" filter="url(#glow)">
  <ellipse cx="180" cy="120" rx="260" ry="150" fill="#7defc9" opacity="0.10"/>
  <ellipse cx="880" cy="400" rx="300" ry="160" fill="#c77bff" opacity="0.10"/>
  <ellipse cx="520" cy="250" rx="340" ry="150" fill="#5b8cff" opacity="0.10"/>
</g>

